version: "3.8"

services:
  # ──────────────────────────────────────────────
  # DATABASE
  # ──────────────────────────────────────────────
  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "asdf;lkj"
      MYSQL_DATABASE: todolistapp_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_volume:/var/lib/mysql
    networks:
      - todolistapp_network
    mem_limit: 768m
    mem_reservation: 512m
    cpus: "1.0"
    command: >
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --max-connections=50
      --performance-schema=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # REDIS
  # ──────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - todolistapp_network
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────
  # SPRING BOOT APP
  # ──────────────────────────────────────────────
  todolistapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: todolistapp:latest
    container_name: todolistapp
    restart: always
    ports:
      - "8080:8080"
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql_db:3306/todolistapp_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
      DB_USERNAME: root
      DB_PASSWORD: "asdf;lkj"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET_KEY: "your_super_long_random_secret_key_here_minimum_256_bits"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # FIX: LOG_PATH absolut agar logback-spring.xml bisa buat direktori di Docker
      LOG_PATH: /app/logs
    volumes:
      # FIX: mount direktori logs ke host agar log persist saat container restart
      - ./logs:/app/logs
    depends_on:
      mysql_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - todolistapp_network
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8082/internal/actuator/health || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ──────────────────────────────────────────────
  # NGINX
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - todolistapp_network
    depends_on:
      todolistapp:
        condition: service_healthy
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.5"

  # ──────────────────────────────────────────────
  # PROMETHEUS
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus-config:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus-config/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - todolistapp_network
    depends_on:
      todolistapp:
        condition: service_healthy
    mem_limit: 256m
    mem_reservation: 128m

  # ──────────────────────────────────────────────
  # GRAFANA
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - todolistapp_network
    depends_on:
      - prometheus
    mem_limit: 256m
    mem_reservation: 128m

volumes:
  mysql_volume:
  prometheus_data:
  grafana_data:

networks:
  todolistapp_network:
    driver: bridge
