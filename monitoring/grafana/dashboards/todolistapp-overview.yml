{
  "title": "Todolist API - Overview",
  "uid": "todolist-overview",
  "tags": ["todolist", "spring-boot"],
  "timezone": "browser",
  "schemaVersion": 36,
  "version": 1,
  "refresh": "15s",
  "panels":
    [
      {
        "id": 1,
        "title": "App Status",
        "type": "stat",
        "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
        "targets":
          [{ "expr": 'up{job="todolist-api-prod"}', "legendFormat": "Status" }],
        "options":
          {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
          },
        "fieldConfig":
          {
            "defaults":
              {
                "mappings":
                  [
                    {
                      "options":
                        {
                          "0": { "text": "DOWN", "color": "red" },
                          "1": { "text": "UP", "color": "green" },
                        },
                      "type": "value",
                    },
                  ],
              },
          },
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
      {
        "id": 2,
        "title": "HTTP Request Rate (req/s)",
        "type": "timeseries",
        "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
        "targets":
          [
            {
              "expr": 'rate(http_server_requests_seconds_count{job="todolist-api-prod"}[1m])',
              "legendFormat": "{{method}} {{uri}} {{status}}",
            },
          ],
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
      {
        "id": 3,
        "title": "HTTP Response Time P95 (ms)",
        "type": "timeseries",
        "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
        "targets":
          [
            {
              "expr": 'histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{job="todolist-api-prod"}[5m])) * 1000',
              "legendFormat": "P95 {{uri}}",
            },
          ],
        "fieldConfig": { "defaults": { "unit": "ms" } },
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
      {
        "id": 4,
        "title": "HTTP Error Rate (5xx)",
        "type": "timeseries",
        "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
        "targets":
          [
            {
              "expr": 'rate(http_server_requests_seconds_count{job="todolist-api-prod", status=~"5.."}[1m])',
              "legendFormat": "5xx {{uri}}",
            },
          ],
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
      {
        "id": 5,
        "title": "JVM Memory Used",
        "type": "timeseries",
        "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
        "targets":
          [
            {
              "expr": 'jvm_memory_used_bytes{job="todolist-api-prod", area="heap"}',
              "legendFormat": "Heap Used",
            },
            {
              "expr": 'jvm_memory_max_bytes{job="todolist-api-prod", area="heap"}',
              "legendFormat": "Heap Max",
            },
          ],
        "fieldConfig": { "defaults": { "unit": "bytes" } },
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
      {
        "id": 6,
        "title": "JVM Threads",
        "type": "timeseries",
        "gridPos": { "h": 8, "w": 8, "x": 0, "y": 20 },
        "targets":
          [
            {
              "expr": 'jvm_threads_live_threads{job="todolist-api-prod"}',
              "legendFormat": "Live Threads",
            },
            {
              "expr": 'jvm_threads_daemon_threads{job="todolist-api-prod"}',
              "legendFormat": "Daemon Threads",
            },
          ],
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
      {
        "id": 7,
        "title": "HikariCP - Active DB Connections",
        "type": "timeseries",
        "gridPos": { "h": 8, "w": 8, "x": 8, "y": 20 },
        "targets":
          [
            {
              "expr": 'hikaricp_connections_active{job="todolist-api-prod"}',
              "legendFormat": "Active",
            },
            {
              "expr": 'hikaricp_connections_pending{job="todolist-api-prod"}',
              "legendFormat": "Pending",
            },
            {
              "expr": 'hikaricp_connections_idle{job="todolist-api-prod"}',
              "legendFormat": "Idle",
            },
          ],
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
      {
        "id": 8,
        "title": "CPU Usage (%)",
        "type": "timeseries",
        "gridPos": { "h": 8, "w": 8, "x": 16, "y": 20 },
        "targets":
          [
            {
              "expr": 'process_cpu_usage{job="todolist-api-prod"} * 100',
              "legendFormat": "Process CPU",
            },
            {
              "expr": 'system_cpu_usage{job="todolist-api-prod"} * 100',
              "legendFormat": "System CPU",
            },
          ],
        "fieldConfig":
          { "defaults": { "unit": "percent", "min": 0, "max": 100 } },
        "datasource": { "type": "prometheus", "uid": "prometheus" },
      },
    ],
}
