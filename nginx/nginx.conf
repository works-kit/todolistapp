# ═════════════════════════════════════════════════════════════════════════════
# NGINX Configuration — Production Ready
# Setup: Reverse Proxy + Caching + Rate Limiting
# ═════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────────────────────────────────
    # LOGGING FORMAT
    # ──────────────────────────────────────────────────────────────────────

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream: $upstream_addr '
                    'cache: $upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    # ──────────────────────────────────────────────────────────────────────
    # BASIC PERFORMANCE
    # ──────────────────────────────────────────────────────────────────────

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;

    # ──────────────────────────────────────────────────────────────────────
    # GZIP COMPRESSION
    # ──────────────────────────────────────────────────────────────────────

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain
               text/css
               application/json
               application/javascript
               text/xml
               application/xml
               image/svg+xml;
    gzip_comp_level 5;

    # ──────────────────────────────────────────────────────────────────────
    # PROXY CACHE CONFIGURATION
    # ──────────────────────────────────────────────────────────────────────

    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=app_cache:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # ──────────────────────────────────────────────────────────────────────
    # RATE LIMITING
    # Sesuai application.properties: capacity=60, auth.capacity=10
    # ──────────────────────────────────────────────────────────────────────

    # FIX 1: rate disesuaikan dengan app.rate-limiter.capacity=60 per menit
    # = 1r/s untuk umum, auth lebih ketat
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=1r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;  # ← TAMBAH zone khusus auth
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ──────────────────────────────────────────────────────────────────────
    # UPSTREAM
    # Service name "todolistapp" sesuai nama service di docker-compose
    # ──────────────────────────────────────────────────────────────────────

    upstream backend_cluster {
        least_conn;

        server todolistapp:8080;

        keepalive 32;
    }

    # ──────────────────────────────────────────────────────────────────────
    # SERVER BLOCK
    # ──────────────────────────────────────────────────────────────────────

    server {
        listen 80;
        server_name localhost;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        # FIX 3: Tambah Referrer-Policy dan Permissions-Policy yang hilang
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        # Rate Limiting Global
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: STATIC FILES
        # ──────────────────────────────────────────────────────────────────

        location /static/ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: AUTH — rate limit lebih ketat (sesuai auth.capacity=10)
        # Harus didefinisikan SEBELUM /api/ karena lebih spesifik
        # ──────────────────────────────────────────────────────────────────

        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://backend_cluster;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Auth tidak boleh di-cache (ada credential)
            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: API — semua request diteruskan ke Spring Boot
        # Spring Boot context-path=/api, jadi /api/** diteruskan apa adanya
        # ──────────────────────────────────────────────────────────────────

        location /api/ {

            # ───── CACHE CONFIGURATION ─────
            proxy_cache app_cache;
            proxy_cache_methods GET;
            proxy_cache_key "$request_method$request_uri$http_authorization";  # ← tambah $http_authorization supaya cache per-user
            proxy_cache_valid 200 302  10m;
            proxy_cache_valid 404      1m;
            proxy_cache_use_stale error timeout updating
                                  http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;

            # ───── REVERSE PROXY ─────
            proxy_pass http://backend_cluster;

            # ───── HEADER FORWARDING ─────
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ───── TIMEOUT ─────
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # ───── BUFFERING ─────
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: HEALTH CHECK (Nginx-level, tidak hit Spring Boot)
        # ──────────────────────────────────────────────────────────────────

        location /health {
            access_log off;
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: NGINX STATUS (hanya dari internal network)
        # ──────────────────────────────────────────────────────────────────

        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        # ──────────────────────────────────────────────────────────────────
        # BLOCK: Actuator tidak boleh bisa diakses dari luar
        # Port 8082 tidak di-expose ke Nginx, tapi block di-sini sebagai
        # defense-in-depth kalau ada misconfiguration
        # ──────────────────────────────────────────────────────────────────

        location /internal/ {
            deny all;
            return 403;
        }

        # ──────────────────────────────────────────────────────────────────
        # ERROR PAGES
        # ──────────────────────────────────────────────────────────────────

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}