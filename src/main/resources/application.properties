spring.application.name=todolistapp

# ===============================
# APPLICATION
# ===============================
server.servlet.context-path=/api
server.port=8080
# spring.profiles.active=local
spring.threads.virtual.enabled=true
cors.allowed-origins=http://localhost:3000, http://localhost:5173


# ===============================
# DATASOURCE COMMON
# ===============================
# Tambah default value untuk local/test tanpa Docker
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/todolistapp_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:asdf;lkj}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=TodoHikariPool

# ===============================
# JPA COMMON
# ===============================
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.ddl-auto=validate


# ===============================
# REDIS COMMON
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000
spring.data.redis.connect-timeout=1000
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=1000ms

# ===============================
# FLYWAY
# ===============================
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.access=READ_ONLY
management.metrics.tags.application=${spring.application.name}
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

info.app.name=Todolist REST API
info.app.description=Spring Boot Monolith Todolist
info.app.version=1.0.0

# ===============================
# LOGGING
# Konfigurasi level & appender dikelola sepenuhnya oleh logback-spring.xml
# Properties ini hanya untuk threshold performa custom
# ===============================
app.logging.slow-request-threshold-ms=1000
app.logging.slow-query-threshold-ms=500
app.logging.slow-service-threshold-ms=2000


# ===============================
# MESSAGES
# ===============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true

# ===============================
# JWT
# ===============================
# Tambah default fallback — profile local/dev override ini
app.jwt.secret-key=${JWT_SECRET_KEY:default-local-secret-key-minimum-256-bits-long-for-dev}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ===============================
# RATE LIMITER
# ===============================
app.rate-limiter.capacity=60
app.rate-limiter.refill-duration-seconds=60
app.rate-limiter.auth.capacity=10
app.rate-limiter.auth.refill-duration-seconds=60

# ===============================
# ASYNC
# ===============================
app.async.core-pool-size=2
app.async.max-pool-size=10
app.async.queue-capacity=100
app.async.thread-name-prefix=async-
app.async.keep-alive-seconds=60

# ===============================
# SECURITY HEADERS
# ===============================
app.security.headers.hsts-enabled=false
app.security.headers.frame-options=DENY
app.security.headers.csp=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'
