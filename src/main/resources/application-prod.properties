# ===============================
# application-prod.properties
# Profile: prod (production)
# SEMUA nilai wajib dari environment variable — tidak boleh ada hardcode
# ===============================

# cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET, POST, PUT, DELETE
cors.allowed-headers=Content-Type, Authorization

# ── DATASOURCE ──────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=TodoHikariPool-Prod

# ── JPA ─────────────────────────
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── FLYWAY ──────────────────────
spring.flyway.enabled=true

# ── REDIS ───────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# ── ACTUATOR ────────────────────
# Port terpisah 8082 — tidak expose ke public, hanya Prometheus internal
management.server.port=8082
management.endpoints.web.base-path=/internal/actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never

# ── PROMETHEUS ──────────────────
management.prometheus.metrics.export.enabled=true

# ── JWT ─────────────────────────
app.jwt.secret-key=${JWT_SECRET_KEY}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ── LOGGING ─────────────────────
# Level & appender dikelola logback-spring.xml
# Hanya threshold performa di sini
app.logging.slow-request-threshold-ms=800
app.logging.slow-query-threshold-ms=200
app.logging.slow-service-threshold-ms=1500


# ── SECURITY HEADERS ────────────
app.security.headers.hsts-enabled=true
app.security.headers.frame-options=DENY
app.security.headers.csp=default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; upgrade-insecure-requests

# ── RATE LIMITER ────────────────
# Ketat di production
app.rate-limiter.capacity=60
app.rate-limiter.auth.capacity=10

# ── ASYNC ────────────────────────────────────────────────────
app.async.core-pool-size=5
app.async.max-pool-size=20
app.async.queue-capacity=200


# ── Spring DOC ────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false