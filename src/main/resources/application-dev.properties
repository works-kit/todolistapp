# ===============================
# application-dev.properties
# Profile: dev (Docker Compose lokal)
# Jalankan: docker-compose up
#           atau mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ===============================

cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET, POST, PUT, DELETE
cors.allowed-headers=Content-Type, Authorization

# ── DATASOURCE ──────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/todolistapp_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
spring.datasource.username=root
spring.datasource.password=asdf;lkj
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ─────────────────────────
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── FLYWAY ──────────────────────
spring.flyway.enabled=true

# ── REDIS ───────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# ── ACTUATOR ────────────────────
management.server.port=8082
management.endpoints.web.base-path=/internal/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers,env,flyway
management.endpoint.health.show-details=always

# ── PROMETHEUS ──────────────────
management.prometheus.metrics.export.enabled=true

# ── JWT ─────────────────────────
app.jwt.secret-key=dev-secret-key-for-development-only-minimum-256-bits-long
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=86400000

# ── LOGGING ─────────────────────
# Level & appender dikelola logback-spring.xml
# Hanya threshold performa di sini
app.logging.slow-request-threshold-ms=2000
app.logging.slow-query-threshold-ms=500
app.logging.slow-service-threshold-ms=3000


# ── SECURITY HEADERS ────────────
app.security.headers.hsts-enabled=false
app.security.headers.frame-options=DENY
app.security.headers.csp=default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'

# ── RATE LIMITER ────────────────
# Longgar untuk dev
app.rate-limiter.capacity=500
app.rate-limiter.auth.capacity=50