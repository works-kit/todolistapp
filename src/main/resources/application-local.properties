# ═══════════════════════════════════════════════════════════════
# application-local.properties
# Profile : local  (digunakan oleh unit & integration local)
# Aktifkan : @ActiveProfiles("local") atau -Dspring.profiles.active=local
# Basis    : application.properties + application-local.properties
# ═══════════════════════════════════════════════════════════════

# ── DATASOURCE ──────────────────────────────────────────────────
# H2 in-memory dengan MODE=MySQL agar sintaks MySQL tetap valid
spring.datasource.url=jdbc:h2:mem:todolistapp_localdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Kurangi pool size — tidak perlu banyak koneksi di local
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.pool-name=localHikariPool

# ── JPA ─────────────────────────────────────────────────────────
# Hibernate kelola DDL (create-drop) — Flyway dimatikan
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── FLYWAY ──────────────────────────────────────────────────────
# Nonaktifkan — schema dikelola Hibernate saat local
spring.flyway.enabled=false

# ── REDIS ───────────────────────────────────────────────────────
# Nonaktifkan sepenuhnya — TokenBlacklistService di-mock di unit local
management.health.redis.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── H2 CONSOLE ──────────────────────────────────────────────────
# Aktifkan untuk inspeksi schema jika perlu debug
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ─────────────────────────────────────────────────────────
# Nama properti HARUS sesuai dengan application.properties → app.jwt.secret-key
app.jwt.secret-key=local-secret-key-for-unit-localing-only-minimum-256-bits
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=86400000

# ── MESSAGES ────────────────────────────────────────────────────
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true

# ── ACTUATOR ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── LOGGING ─────────────────────────────────────────────────────
# Longgarkan threshold — hindari noise "slow" warning di local
app.logging.slow-request-threshold-ms=5000
app.logging.slow-query-threshold-ms=3000
app.logging.slow-service-threshold-ms=10000

# ── RATE LIMITER ────────────────────────────────────────────────
# Kapasitas sangat besar — rate limiter tidak boleh memblokir local
app.rate-limiter.capacity=100000
app.rate-limiter.refill-duration-seconds=60
app.rate-limiter.auth.capacity=100000
app.rate-limiter.auth.refill-duration-seconds=60

# ── ASYNC ───────────────────────────────────────────────────────
app.async.core-pool-size=1
app.async.max-pool-size=2
app.async.queue-capacity=10
app.async.thread-name-prefix=local-async-
app.async.keep-alive-seconds=30

# ── CORS ────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000

# ── SECURITY HEADERS ────────────────────────────────────────────
app.security.headers.hsts-enabled=false
app.security.headers.frame-options=SAMEORIGIN
app.security.headers.csp=default-src 'self'

# ── VIRTUAL THREADS ─────────────────────────────────────────────
# Nonaktifkan — bisa menyebabkan ordering issue di beberapa versi JUnit 5
spring.threads.virtual.enabled=false